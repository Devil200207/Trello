<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trello · workspace</title>
    <link rel="stylesheet" href="/app.css">
</head>

<body>
    <header class="app-header">
        <div>
            <h1>trello <span class="sub">| atlassian</span></h1>
            <div class="sub" id="header-context"></div>
        </div>
        <div class="header-actions">
            <button type="button" class="btn ghost hidden" id="btn-back-dashboard">Dashboard</button>
            <button type="button" class="btn ghost hidden" id="header-board">Create</button>
            <button type="button" class="btn ghost hidden" id="header-org">Org</button>
            <button type="button" class="btn ghost" id="btn-signout-header">Sign out</button>
        </div>
    </header>

    <main>
        <section class="view" data-view="auth">
            <div class="panel">
                <div class="tabs">
                    <button type="button" class="active" id="tab-signin">Sign in</button>
                    <button type="button" id="tab-signup">Sign up</button>
                </div>
                <form id="form-signin">
                    <h2>Sign in</h2>
                    <div class="field">
                        <label for="signin-email">Email</label>
                        <input type="email" id="signin-email" name="email" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" name="password" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn primary btn-block">Submit</button>
                    <p class="msg" id="msg-signin"></p>
                </form>
                <form id="form-signup" class="hidden">
                    <h2>Sign up</h2>
                    <div class="field">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" required
                            autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn primary btn-block">Submit</button>
                    <p class="msg" id="msg-signup"></p>
                </form>
            </div>
        </section>

        <section class="view" data-view="onboarding">
            <div class="panel">
                <h2>Create your first org</h2>
                <form id="form-onboard">
                    <div class="field">
                        <label for="onboard-name">Name</label>
                        <input type="text" id="onboard-name" name="name" required>
                    </div>
                    <div class="field">
                        <label for="onboard-desc">Description</label>
                        <textarea id="onboard-desc" name="description" placeholder="Optional"></textarea>
                    </div>
                    <button type="submit" class="btn primary btn-block">Create org</button>
                    <p class="msg" id="msg-onboard"></p>
                </form>
            </div>
        </section>

        <section class="view" data-view="dashboard">
            <div class="panel wide">
                <h2>Dashboard</h2>
                <div class="header-actions" style="justify-content:flex-start;margin-bottom:1rem;">
                    <button type="button" class="btn primary" id="btn-open-board">Open task board</button>
                    <button type="button" class="btn" id="btn-open-org">Organization</button>
                </div>
                <div class="field" style="max-width:280px;">
                    <label for="dashboard-org">Organization</label>
                    <select id="dashboard-org"></select>
                </div>
                <p class="msg" id="msg-dashboard"></p>
                <div class="board-grid">
                    <button type="button" class="board-card" id="card-task-board" aria-label="Open task board">
                        <div class="thumb"></div>
                        <div class="label">Task board</div>
                    </button>
                </div>
            </div>
        </section>

        <section class="view" data-view="board">
            <div class="panel wide">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;">
                    <h2 style="margin:0;">Board</h2>
                    <button type="button" class="btn primary" id="btn-create-task">Create</button>
                </div>
                <div id="create-task-panel" class="hidden" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
                    <form id="form-new-task">
                        <div class="field">
                            <label for="task-title">Title</label>
                            <input type="text" id="task-title" required>
                        </div>
                        <div class="field">
                            <label for="task-desc">Description</label>
                            <textarea id="task-desc" placeholder="Optional"></textarea>
                        </div>
                        <button type="submit" class="btn primary">Add task</button>
                    </form>
                </div>
                <p class="msg" id="msg-board"></p>
                <div class="kanban">
                    <div class="column" id="col-up-next">
                        <h3>Up next</h3>
                    </div>
                    <div class="column" id="col-in-progress">
                        <h3>In progress</h3>
                    </div>
                    <div class="column" id="col-done">
                        <h3>Done</h3>
                    </div>
                </div>
            </div>
        </section>

        <section class="view" data-view="org">
            <div class="panel wide">
                <h2>Organization</h2>
                <div class="org-layout">
                    <div>
                        <h3 class="sub" style="margin:0 0 0.5rem;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;">Members</h3>
                        <div id="member-list"></div>
                    </div>
                    <div class="invite-panel">
                        <h3>Invite</h3>
                        <form id="form-invite">
                            <div class="field">
                                <label for="invite-email">Email</label>
                                <input type="email" id="invite-email" required>
                            </div>
                            <button type="submit" class="btn primary btn-block">Invite</button>
                        </form>
                        <p class="msg" id="msg-org"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>

</html>
