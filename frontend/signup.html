<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up · trello</title>
    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container {
            background: #fff;
            padding: 1.5rem;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            width: 100%;
            max-width: 360px;
        }

        h2 {
            margin: 0 0 1.25rem;
            font-size: 1.125rem;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 0.875rem;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }

        input {
            width: 100%;
            padding: 0.5rem 0.625rem;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font: inherit;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.5rem 0.875rem;
            margin-top: 0.25rem;
            background: #1f2937;
            border: 1px solid #1f2937;
            color: #fff;
            border-radius: 6px;
            font: inherit;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            opacity: 0.92;
        }

        #message {
            margin-top: 0.75rem;
            text-align: center;
            font-size: 0.8125rem;
            color: #6b7280;
        }

        .error {
            color: #b91c1c;
        }

        .nav-foot {
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .nav-foot a {
            color: #2563eb;
        }

        .password-hint {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.35rem;
            display: none;
        }

        .password-strength {
            margin-top: 0.35rem;
        }

        .password-strength div {
            height: 4px;
            border-radius: 4px;
        }

        .weak {
            width: 33%;
            background-color: #ef4444;
        }

        .medium {
            width: 66%;
            background-color: #f59e0b;
        }

        .strong {
            width: 100%;
            background-color: #22c55e;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Sign up</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <div class="password-hint" id="passwordHint">
                    Use at least 8 characters with mixed case, numbers, and symbols.
                </div>
                <span id="passwordError" class="error"></span>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                    autocomplete="new-password">
                <span id="confirmPasswordError" class="error"></span>
            </div>
            <button type="submit">Sign up</button>
        </form>
        <p id="message"></p>
        <p class="nav-foot">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
    <script>
        const API_BASE =
            window.location.protocol === "file:" ? "http://localhost:4000" : "";

        async function api(path, options) {
            const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
            const res = await fetch(API_BASE + path, { ...options, headers });
            const text = await res.text();
            let data = text;
            try {
                data = text ? JSON.parse(text) : null;
            } catch (_) { /* plain text */ }
            if (!res.ok) {
                const msg =
                    typeof data === "string" ? data : data?.message || res.statusText;
                throw new Error(msg);
            }
            return data;
        }

        function getPasswordStrength(password) {
            if (password.length < 8) return "weak";
            if (password.match(/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])/)) return "strong";
            return "medium";
        }

        document.getElementById("password").addEventListener("focus", function () {
            document.getElementById("passwordHint").style.display = "block";
        });
        document.getElementById("password").addEventListener("blur", function () {
            document.getElementById("passwordHint").style.display = "none";
        });
        document.getElementById("password").addEventListener("input", function () {
            const passwordStrength = document.getElementById("passwordStrength");
            const strength = getPasswordStrength(this.value);
            passwordStrength.innerHTML = "";
            if (this.value) {
                const bar = document.createElement("div");
                bar.className = strength;
                passwordStrength.appendChild(bar);
            }
        });

        document.getElementById("signupForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const message = document.getElementById("message");
            const confirmPasswordError = document.getElementById("confirmPasswordError");
            message.textContent = "";
            message.classList.remove("error");
            confirmPasswordError.textContent = "";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                confirmPasswordError.textContent = "Passwords do not match.";
                return;
            }

            try {
                await api("/signup", {
                    method: "POST",
                    body: JSON.stringify({ email, password }),
                });
                message.textContent = "Account created. You can sign in.";
                const home =
                    window.location.protocol === "file:" ? "index.html" : "/";
                setTimeout(function () {
                    window.location.href = home;
                }, 800);
            } catch (err) {
                message.textContent = err.message || "Signup failed";
                message.classList.add("error");
            }
        });
    </script>
</body>

</html>
