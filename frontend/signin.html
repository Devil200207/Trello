<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/">
    <title>Redirecting…</title>
    <script>

            window.location.protocol === "file:"
                ? "index.html"
                : "/"
        );
    </script>
</head>
